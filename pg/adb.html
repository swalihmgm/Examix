<html lang="en">

<head>

    rel="stylesheet">
  <style>
    :root {
      --primary: #8B5CF6;
      --primary-dark: #6D28D9;
      --accent: #06B6D4;
      --bg-dark: #0F172A;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shine: rgba(255, 255, 255, 0.05);
      --success: #10B981;
      --error: #EF4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: 'Plus Jakarta Sans', 'Amiri', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
      background-image:
        radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.15) 0%, transparent 50%);
      background-attachment: fixed;
    }

    /* Animated Background Blobs */
    .blob {
      position: fixed;
      width: 500px;
      height: 500px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      filter: blur(80px);
      border-radius: 50%;
      z-index: -1;
      opacity: 0.15;
      animation: move 20s infinite alternate;
    }

    .blob-1 {
      top: -250px;
      left: -250px;
      animation-delay: 0s;
    }

    .blob-2 {
      bottom: -250px;
      right: -250px;
      animation-delay: -5s;
    }

    @keyframes move {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(100px, 100px) scale(1.1);
      }
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    @media (min-width: 768px) {
      .navbar {
        padding: 15px 5%;
      }
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .navbar img {
      width: 32px;
      height: 32px;
      border-radius: 10px;
    }

    @media (min-width: 768px) {
      .navbar img {
        width: 40px;
        height: 40px;
      }
    }

    .navbar h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(to right, #fff, var(--text-muted));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    @media (min-width: 768px) {
      .navbar h2 {
        font-size: 24px;
      }
    }

    #nav-icon {
      width: 32px;
      height: 32px;
      cursor: pointer;
      opacity: 0.7;
    }

    #container {
      width: 100%;
      max-width: 700px;
      margin: 20px auto;
      padding: 16px;
      position: relative;
    }

    @media (min-width: 768px) {
      #container {
        margin: 40px auto;
        padding: 20px;
      }
    }

    #subject-selection h2,
    #part-selection-subject3 h2,
    #part-selection-subject1 h2,
    #part-selection-subject2 h2,
    #learning-container h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      text-align: center;
      margin-bottom: 24px;
      color: #fff;
    }

    @media (min-width: 768px) {

      #subject-selection h2,
      #part-selection-subject3 h2,
      #part-selection-subject1 h2,
      #part-selection-subject2 h2,
      #learning-container h2 {
        font-size: 28px;
        margin-bottom: 30px;
      }
    }

    .subject-page {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 768px) {
      .subject-page {
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }
    }

    .subject-card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (min-width: 768px) {
      .subject-card {
        padding: 30px 20px;
      }
    }

    .subject-card:hover {
      transform: translateY(-8px);
      background: rgba(30, 41, 59, 0.9);
      border-color: var(--primary);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .subject-icon {
      font-size: 40px;
      margin-bottom: 15px;
      display: block;
    }

    @media (min-width: 768px) {
      .subject-icon {
        font-size: 48px;
      }
    }

    .subject-card div {
      font-family: 'Amiri', serif;
      font-size: 17px;
      line-height: 1.4;
    }

    @media (min-width: 768px) {

    .part-bottons {

      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .part-btn {
      background: rgba(255, 255, 255, 0.05);

      color: var(--text-main);
      padding: 15px 10px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;

    .part-btn:hover {
      background: var(--primary);

    #learning-container {

    hr {

    }

    #quiz-container {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);

    @media (min-width: 768px) {

        padding: 30px;
      }
    }

    #quiz-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
    }

    #timer,

      padding: 8px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);

    #question {

      padding: 20px;

      font-weight: 600;
      text-align: center;
    }

    .answer-btn {
      width: 100%;
      padding: 18px 20px;
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s;
    }

    .answer-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
      transform: translateX(4px);
    }

    .answer-btn.correct {
      background: rgba(16, 185, 129, 0.2) !important;
      border-color: var(--success) !important;
    }

    .answer-btn.wrong {
      background: rgba(239, 68, 68, 0.2) !important;
      border-color: var(--error) !important;
    }

    #next-btn,
    #prev-btn {
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    #next-btn {
      background: var(--primary);
      color: white;
      float: right;
    }

    #prev-btn {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      border: 1px solid var(--glass-border);
      float: left;
    }

    #result-container {
      text-align: center;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 50px 30px;
      border: 1px solid var(--glass-border);
    }

    #score {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      margin-top: 20px;
    }

    .progress-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      margin: 15px 0 5px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(to right, var(--primary), var(--accent));
      width: 0%;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-text {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
    }

    .back-btn {
      cursor: pointer;
      color: var(--text-muted);
      margin-bottom: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    .clearfix::after {
      content: "";
      display: table;
      clear: both;
    }

    .hidden {
      display: none !important;
    }
  </style>

</head>

<body>

  <script>
    let quizData = [];
    let currentQuestion = 0;
    let score = 0;
    let timeRemaining = 3600;
    let userProgress = {};
    let activePart = "";
    let timerInterval;

    async function loadUserProgress() {
      if (!auth.currentUser) return;
      const doc = await db.collection('users').doc(auth.currentUser.uid).get();
      if (doc.exists) {
        userProgress = doc.data().progress || {};
        calculateAdbProgress();
      }
    }

    async function saveProgress(partId, highscore, total) {
      if (!auth.currentUser) return;
      const key = `adb_${partId}`;
      const existing = userProgress[key] || { highscore: 0, total: total };

      if (highscore >= existing.highscore) {
        userProgress[key] = { highscore, total };
        await calculateAdbProgress();
      }
    }

    async function calculateAdbProgress() {
      const subjects = {
        s1: ['part1', 'part2', 'part3'],
        s2: ['part4', 'part5', 'part6'],
        s3: ['part7', 'part8', 'part9', 'part10', 'part11', 'part12', 'part13', 'part14', 'part15', 'part16', 'part17', 'part18', 'part19', 'part20']
      };

      let totalSubPercent = 0;
      Object.keys(subjects).forEach(s => {
        const parts = subjects[s];
        let partSum = 0;
        parts.forEach(p => {
          const kp = `adb_${p}`;
          if (userProgress[kp] && userProgress[kp].total > 0) {
            partSum += (userProgress[kp].highscore / userProgress[kp].total);
          }
        });
        totalSubPercent += (partSum / parts.length);
      });

      const globalPercent = Math.round((totalSubPercent / 3) * 100);
      userProgress['adb_global_percent'] = globalPercent;

      const localUser = JSON.parse(localStorage.getItem('examix_user'));
      if (localUser) {
        localUser.progress = userProgress;
        localStorage.setItem('examix_user', JSON.stringify(localUser));
      }
      if (auth.currentUser) {
        await db.collection('users').doc(auth.currentUser.uid).set({
          progress: userProgress
        }, { merge: true });
      }
    }

    const ADB_CONFIG = {
      subject1: {
        id: "subject1",
        name: "مقومات النهضة وعواملها",
        icon: "🏛️",
        parts: ["part1", "part2", "part3"]

      subject2: {
        id: "subject2",
        name: "الشعر في العصر الحديث",
        icon: "📝",

      subject3: {

    const csvUrls = {

      part11: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZS4b7ckl_90BDHpqQ1nORa-oM1hXYO5IVWC6cMw--oWRXxdUD9RSxHoYIKTbInXSHAZKF08rY-7YR/pub?output=csv&gid=320717241",
      part12: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZS4b7ckl_90BDHpqQ1nORa-oM1hXYO5IVWC6cMw--oWRXxdUD9RSxHoYIKTbInXSHAZKF08rY-7YR/pub?output=csv&gid=1730898423",
      part13: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZS4b7ckl_90BDHpqQ1nORa-oM1hXYO5IVWC6cMw--oWRXxdUD9RSxHoYIKTbInXSHAZKF08rY-7YR/pub?output=csv&gid=1485835864",
      part14: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZS4b7ckl_90BDHpqQ1nORa-oM1hXYO5IVWC6cMw--oWRXxdUD9RSxHoYIKTbInXSHAZKF08rY-7YR/pub?output=csv&gid=2146806655",
      part15: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZS4b7ckl_90BDHpqQ1nORa-oM1hXYO5IVWC6cMw--oWRXxdUD9RSxHoYIKTbInXSHAZKF08rY-7YR/pub?output=csv&gid=936885024",
      part16: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZS4b7ckl_90BDHpqQ1nORa-oM1hXYO5IVWC6cMw--oWRXxdUD9RSxHoYIKTbInXSHAZKF08rY-7YR/pub?output=csv&gid=1584329259",
      part17: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZS4b7ckl_90BDHpqQ1nORa-oM1hXYO5IVWC6cMw--oWRXxdUD9RSxHoYIKTbInXSHAZKF08rY-7YR/pub?output=csv&gid=285506033",
      part18: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZS4b7ckl_90BDHpqQ1nORa-oM1hXYO5IVWC6cMw--oWRXxdUD9RSxHoYIKTbInXSHAZKF08rY-7YR/pub?output=csv&gid=730094281",
      part19: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZS4b7ckl_90BDHpqQ1nORa-oM1hXYO5IVWC6cMw--oWRXxdUD9RSxHoYIKTbInXSHAZKF08rY-7YR/pub?output=csv&gid=760060719",
      part20: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZS4b7ckl_90BDHpqQ1nORa-oM1hXYO5IVWC6cMw--oWRXxdUD9RSxHoYIKTbInXSHAZKF08rY-7YR/pub?output=csv&gid=841965673",
    };

    const partNames = {
      part10: "العقاد",
      part11: "طه حسين",
      part12: "ميخائيل نعيمة",
      part13: "شوقي ضيف",
      part14: "محمد عبده",
      part15: "مصطفى لطفى المنفلوطي",
      part16: "توفيق الحكيم",
      part17: "محمود درويش",
      part18: "أبو القاسم الشابي",
      part19: "أحمد شوقي",
      part20: "Part 4 (18 to 19)"
    };

    function renderSubjects() {
      const grid = document.getElementById('subjects-grid');
      grid.innerHTML = '';
      Object.keys(ADB_CONFIG).forEach(key => {
        const sub = ADB_CONFIG[key];
        let totalPercent = 0;
        sub.parts.forEach(p => {
          const progress = userProgress[`adb_${p}`];
          if (progress && progress.total > 0) {
            totalPercent += (progress.highscore / progress.total);
          }
        });
        const percent = Math.round((totalPercent / sub.parts.length) * 100);

        const card = document.createElement('div');
        card.className = 'subject-card';
        card.innerHTML = `
          <span class="subject-icon">${sub.icon}</span>
          <div style="font-weight:700; margin-bottom:10px;">${sub.name}</div>
          <div class="progress-container">
            <div class="progress-bar" style="width: ${percent}%"></div>
          </div>
          <div class="progress-text">${percent}% Mastered</div>
        `;
        card.onclick = () => renderParts(key);
        grid.appendChild(card);
      });
    }

    function renderParts(subjectKey) {
      const sub = ADB_CONFIG[subjectKey];
      document.getElementById('current-subject-title').textContent = sub.name;
      const grid = document.getElementById('parts-grid');
      grid.innerHTML = '';

      sub.parts.forEach(p => {
        const progress = userProgress[`adb_${p}`];
        let percent = 0;
        if (progress && progress.total > 0) {
          percent = Math.round((progress.highscore / progress.total) * 100);
        }
        const name = partNames[p] || (p.replace('part', 'Part '));

        const card = document.createElement('div');
        card.className = 'subject-card';
        card.style.padding = "20px 15px";
        card.innerHTML = `
          <div style="font-weight:700; margin-bottom:10px;">${name}</div>
          <div class="progress-container">
            <div class="progress-bar" style="width: ${percent}%"></div>
          </div>
          <div class="progress-text">${percent}% Done</div>
        `;
        card.onclick = () => startQuiz(p);
        grid.appendChild(card);
      });

      document.getElementById('subject-selection').classList.add('hidden');
      document.getElementById('part-selection').classList.remove('hidden');
    }

    function showSubjects() {
      renderSubjects();
      document.getElementById('subject-selection').classList.remove('hidden');
      document.getElementById('part-selection').classList.add('hidden');
      document.getElementById('learning-container').style.display = 'none';
      document.getElementById('quiz-container').style.display = 'none';
      document.getElementById('result-container').style.display = 'none';
    }

    function goToSubject(subject) {
      renderParts(subject);
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function shuffleOptions(options) {
      const correctAnswer = options[0];
      const shuffled = shuffleArray([...options]);
      const newCorrectIndex = shuffled.indexOf(correctAnswer);
      return { shuffled, correctIndex: newCorrectIndex };
    }

    async function fetchQuizData(part) {
      try {
        const response = await fetch(csvUrls[part]);
        const csvText = await response.text();
        const rows = csvText.split("\n").map(row => row.split(",").map(cell => cell.trim()));
        quizData = rows.slice(1).map(row => {
          const { shuffled, correctIndex } = shuffleOptions(row.slice(1, 5));
          return {
            question: row[0],
            options: shuffled,
            correct: correctIndex
          };
        });

        document.getElementById("quiz-container").style.display = "block";
        startTimer();
        loadQuestion();
      } catch (error) {
        alert("Failed to load quiz data.");
        console.error(error);
      }
    }

    auth.onAuthStateChanged(user => {
      if (user) loadUserProgress();
    });

    let selectedPart = null;

    function startQuiz(part) {
      activePart = part;
      selectedPart = part;
      currentQuestion = 0;
      score = 0;
      timeRemaining = 3600;
      fetchLearningData(part); // Show learning material before quiz
    }

    async function fetchLearningData(part) {
      try {
        const response = await fetch(csvUrls[part]);
        const csvText = await response.text();
        const rows = csvText.split("\n").map(row => row.split(",").map(cell => cell.trim()));
        quizData = rows.slice(1).map(row => {
          const { shuffled, correctIndex } = shuffleOptions(row.slice(1, 5));
          return {
            question: row[0],
            options: shuffled,
            correct: correctIndex
          };
        });

        document.getElementById("subject-selection").classList.add('hidden');
        document.getElementById("part-selection").classList.add('hidden');
        document.getElementById("quiz-container").style.display = "none";
        document.getElementById("result-container").style.display = "none";
        document.getElementById("learning-container").style.display = "block";

        const learningContent = document.getElementById("learning-content");
        learningContent.innerHTML = "";

        quizData.forEach((q, i) => {
          const originalAnswer = q.options[q.correct]; // Correct answer after shuffling
          const div = document.createElement("div");

          // Detect if content is Arabic or English
          const isArabic = /[\u0600-\u06FF]/.test(q.question);
          const textClass = isArabic ? 'arabic-text' : 'english-text';

          div.innerHTML = `
        <p class="${textClass}"><strong>Q${i + 1}:</strong> ${q.question}</p>
        <p class="${textClass}" style="line-height: 25px;"><strong>Ans:</strong> ${originalAnswer}</p>
        <hr style="color: #9C27B0; margin: 5px;">
      `;
          learningContent.appendChild(div);
        });
        startTimer(30 * 60, true);
      } catch (error) {
        alert("Failed to load study material.");
        console.error(error);
      }
    }

    function beginQuiz() {
      document.getElementById("learning-container").style.display = "none";
      document.getElementById("quiz-container").style.display = "block";
      timeRemaining = 3600;
      startTimer();
      loadQuestion();
    }

    function startTimer(seconds, isLearning = false) {
      clearInterval(timerInterval);
      if (seconds) timeRemaining = seconds;
      const elementId = isLearning ? "learning-timer" : "timer";

      const updateDisplay = () => {
        const minutes = Math.floor(timeRemaining / 60);
        const secondsLeft = timeRemaining % 60;
        const el = document.getElementById(elementId);
        if (el) el.textContent = `${minutes}m ${secondsLeft}s`;
      };

      updateDisplay();
      timerInterval = setInterval(() => {
        timeRemaining--;
        updateDisplay();
        if (timeRemaining <= 0) {
          clearInterval(timerInterval);
          if (isLearning) {
            alert("Learning time is up! Starting quiz mode.");
            beginQuiz();
          } else {
            showResults();
          }
        }
      }, 1000);
    }

    function loadQuestion() {
      const questionObj = quizData[currentQuestion];
      const questionElement = document.getElementById("question");

      // Detect if content is Arabic or English and apply appropriate styling
      const isArabic = /[\u0600-\u06FF]/.test(questionObj.question);
      questionElement.className = isArabic ? 'question arabic-text' : 'question english-text';
      questionElement.textContent = questionObj.question;

      document.getElementById("question-number").textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
      const buttons = document.querySelectorAll(".answer-btn");
      buttons.forEach((btn, index) => {
        // Apply appropriate text styling to answer buttons
        const isAnswerArabic = /[\u0600-\u06FF]/.test(questionObj.options[index]);
        btn.className = isAnswerArabic ? 'answer-btn arabic-text' : 'answer-btn english-text';
        btn.textContent = questionObj.options[index];
        btn.disabled = false;
        btn.onclick = () => checkAnswer(btn, index);
      });
      document.getElementById("prev-btn").style.display = currentQuestion > 0 ? "inline-block" : "none";
      document.getElementById("next-btn").style.display = "none";
    }

    function checkAnswer(button, index) {
      const correct = quizData[currentQuestion].correct;
      const buttons = document.querySelectorAll(".answer-btn");
      if (index === correct) {
        button.classList.add("correct");
        score++;
      } else {
        button.classList.add("wrong");
        buttons[correct].classList.add("correct");
      }
      buttons.forEach(btn => btn.disabled = true);
      document.getElementById("next-btn").style.display = "inline-block";
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < quizData.length) {
        loadQuestion();
      } else {
        showResults();
      }
    }

    function prevQuestion() {
      if (currentQuestion > 0) {
        currentQuestion--;
        loadQuestion();
      }
    }

    function showResults() {
      document.getElementById("quiz-container").style.display = "none";
      document.getElementById("result-container").style.display = "block";
      document.getElementById("score").textContent = `You scored ${score} out of ${quizData.length}`;
      if (activePart) {
        saveProgress(activePart, score, quizData.length);
      }

      const btn = document.createElement('button');
      btn.className = "part-btn";
      btn.style.marginTop = "20px";
      btn.textContent = "Back to Parts";
      btn.onclick = () => {
        // Find which subject this part belongs to
        let subKey = "subject3";
        Object.keys(ADB_CONFIG).forEach(k => {
          if (ADB_CONFIG[k].parts.includes(activePart)) subKey = k;
        });
        renderParts(subKey);
        document.getElementById('result-container').style.display = 'none';
      };
      document.getElementById('result-container').appendChild(btn);
    }

    // Initial Load
    auth.onAuthStateChanged(user => {
      if (user) loadUserProgress().then(() => renderSubjects());
      else renderSubjects();
    });
  </script>
</body>
