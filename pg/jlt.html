<head>

    <script>
        if (!localStorage.getItem('examix_user') && !window.location.hash.includes('debug')) {
            document.documentElement.style.display = 'none';

    <style>
        :root {
            --primary: #8B5CF6;
            --primary-dark: #6D28D9;
            --accent: #06B6D4;
            --bg-dark: #0F172A;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #10B981;
            --error: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Amiri', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            top: -250px;
            left: -250px;
        }

        .blob-2 {
            bottom: -250px;
            right: -250px;
            animation-delay: -5s;
        }

        @keyframes move {
            to {
                transform: translate(100px, 100px) scale(1.1);
            }
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.82);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        @media (min-width: 768px) {
            .navbar {
                padding: 15px 5%;
            }
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .navbar img {
            width: 32px;
            height: 32px;
            border-radius: 10px;
        }

        @media (min-width: 768px) {
            .navbar img {
                width: 40px;
                height: 40px;
            }
        }

        .navbar h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (min-width: 768px) {
            .navbar h2 {
                font-size: 24px;
            }
        }

        #container {
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            padding: 16px;
        }

        @media (min-width: 768px) {
            #container {
                margin: 40px auto;
                padding: 20px;
            }
        }

        .view-title {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        @media (min-width: 768px) {
            .view-title {
                font-size: 36px;
                margin-bottom: 40px;
                letter-spacing: -1px;
            }
        }

        /* Grid Layouts */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 24px;
            }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        @media (min-width: 768px) {
            .card {
                border-radius: 24px;
                padding: 30px;
            }
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.9);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .card-title {
            font-family: 'Amiri', serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        /* Buttons */
        .mini-btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .primary-btn {
            background: var(--primary);
            color: white;
        }

        .primary-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .mega-btn {
            width: 100%;
            margin-top: 20px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 18px;
            font-size: 18px;
            border-radius: 16px;
        }

        /* Learning View */
        #learning-view {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--glass-border);
        }

        #learning-content {
            max-height: 500px;
            overflow-y: auto;
            margin: 20px 0;
            padding-right: 10px;
        }

        #learning-content div {
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .arabic-text {
            font-family: 'Amiri', serif;
            font-size: 22px;
            direction: rtl;
            line-height: 1.6;
        }

        /* Quiz View */
        #quiz-view {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--glass-border);
        }

        @media (min-width: 768px) {
            #quiz-view {
                border-radius: 24px;
                padding: 40px;
            }
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
        }

        @media (min-width: 768px) {
            .stat-badge {
                padding: 8px 16px;
                border-radius: 10px;
                font-size: 14px;
            }
        }

        #question {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 24px;
        }

        @media (min-width: 768px) {
            #question {
                font-size: 24px;
                margin-bottom: 30px;
            }
        }

        .answer-btn {
            width: 100%;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
        }

        .answer-btn:hover:not(:disabled) {
            border-color: var(--primary);
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .answer-btn.correct {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--success);
        }

        .answer-btn.wrong {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--error);
        }

        .hidden {
            display: none;
        }

        .back-nav {
            cursor: pointer;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.5s ease;
        }

        .block-count {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .completed-badge {
            background: var(--success);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 15px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            animation: fadeInScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .quiz-header {
                gap: 5px !important;
            }
            #subtopic-display {
                font-size: 11px !important;
                letter-spacing: 0px !important;
                padding: 4px 6px !important;
                max-width: 100px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .stat-badge {
                padding: 4px 8px !important;
                font-size: 11px !important;
            }
            .quiz-actions {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 10px !important;
            }
            #next-btn {
                grid-column: span 2 !important;
                width: 100% !important;
            }
            #prev-btn, #repeat-btn {
                width: 100% !important;
                padding: 10px 5px !important;
                font-size: 11px !important;
            }
            #question {
                font-size: 18px !important;
            }
            .answer-btn {
                padding: 14px !important;
                font-size: 14px !important;
            }
        }
    </style>
</head>

<body>

    <main id="container">

        <!-- View 3: Learning Session -->
        <section id="learning-view" class="hidden">

        <!-- View 4: Quiz Mode -->

                <div class="stat-badge" id="timer">00:00</div>

            <div id="question" class="arabic-text"

            <div id="explanation-container" class="hidden"
                style="background: rgba(139, 92, 246, 0.1); border-right: 4px solid var(--primary); padding: 15px; margin: 0 0 20px 0; border-radius: 8px; font-size: 15px; color: var(--text-muted); text-align: right; direction: rtl;">
                <div
                    style="font-weight: 800; color: var(--primary); margin-bottom: 5px; font-size: 12px; text-transform: uppercase;">
                    Explanation</div>

                <button class="mini-btn" id="prev-btn" onclick="prevQuestion()"

                    Previous</button>
                <button class="mini-btn" id="repeat-btn" onclick="addToRepeat()"

                </button>

        <!-- View 5: Results -->
        <section id="results-view" class="hidden" style="text-align:center;">

            <div style="font-size: 48px; font-weight: 800; color: var(--primary); margin: 20px 0;" id="final-score">0/0

            <div style="display: flex; gap: 15px; justify-content: center;">
                <button id="result-back-btn" class="mini-btn primary-btn">Go to Blocks</button>

                    style="background: rgba(255,b255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-main);"
                    onclick="showMainTopics()">Home</button>

    </main>

    <script>
        // DATA CONFIGURATION
        const JLT_CONFIG = {
            "الشعراء الصعاليك": {
                baseUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vT829znHJ17ez50kpBc8yf4JUtQXBY9TP07_7DtZcGGGdKmNaru5apg-WJ3jSwOG9GiW197I-jilJET/pub?output=csv",
                icon: "📜",
                subtopics: [
                    { name: "تأبط شراً", gid: "0" },
                    { name: "شنفرى", gid: "2086431216" },
                    { name: "عروة بن الورد", gid: "63237584" }
                ]
            },
            "الشعراء المخضرمون": {
                baseUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSW45If_qzYATnWNk62FuKIgGgUpyw85SkRnkKYGFBJcEKTCzqKf8N62qsigkcHb0-jMkA-xgweWGxo/pub?output=csv",
                icon: "🖋️",
                subtopics: [
                    { name: "حسان بن ثابت", gid: "0" },
                    { name: "الخنساء", gid: "1254270587" },
                    { name: "كعب بن زهير", gid: "445085607" },
                    { name: "الحطيئة", gid: "1863746770" }
                ]
            },
            "الشعراء الأمويون": {
                baseUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTooV4wl5JQedA0J6fogA6oLPxqaU6OCY4k9D_g9a3mq1xfj4N9vJvw4I8K7693CUer_BBfTDWpXx6F/pub?output=csv",
                icon: "🏰",
                subtopics: [
                    { name: "عمر بن أبي ربيعة", gid: "0" },
                    { name: "جميل بن معمر", gid: "340098261" },
                    { name: "الأخطل", gid: "88499500" },
                    { name: "الفرزدق", gid: "1496554082" },
                    { name: "جرير", gid: "439136681" }
                ]
            },
            "شعراء العصر العباسي": {
                baseUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQaIdSJwSrkavi9UOL9rRwjz1jIzloMDLSuGRMgMOrALAxcKVb6-qHCyE8z-vWTsRXbdpE-Rw9li0C-/pub?output=csv",
                icon: "🏛️",
                subtopics: [
                    { name: "بشار بن برد", gid: "0" },
                    { name: "أبو نواس", gid: "598103542" },
                    { name: "أبو تمام", gid: "2079304923" },
                    { name: "البحتري", gid: "1442078046" },
                    { name: "المتنبي", gid: "1605510683" },
                    { name: "ابن الرومي", gid: "1166991025" },
                    { name: "أبي العلاء المعري", gid: "1675565389" }
                ]
            }
        };

        let currentQuizData = []; // Full Subtopic Data
        let activeBlockData = []; // Partitioned Data
        let currentIdx = 0;
        let currentScore = 0;
        let timerInterval;
        let timeLeft = 0;

        let userProgress = {};
        let currentTopicId = ""; // Base ID for subtopic
        let currentBlockIdx = -1;
        let currentMainTopic = "";
        let currentSubtopicName = "";

        // Normalize Arabic strings for reliable keys (removes diacritics/tashkeel)
        function normalizeStr(text) {
            if (!text) return "";
            return text
                .normalize("NFD")
                .replace(/[\u064B-\u0652]/g, "") // remove tashkeel
                .replace(/\s+/g, '_')           // spaces to under
                .trim();
        }

        async function init() {
            createLoader();
            showLoading(true);
            try {
                await loadUserProgress();
                renderMainTopics();
            } finally {
                showLoading(false);
            }
        }

        async function loadUserProgress() {
            // First, try to load from localStorage for immediate UI display
            const cachedProgress = localStorage.getItem('jlt_progress_cache');
            if (cachedProgress) {
                userProgress = JSON.parse(cachedProgress);
            }

            return new Promise(async (resolve) => {
                const checkUser = async (user) => {
                    if (user) {
                        try {
                            const doc = await db.collection('users').doc(user.uid).get();
                            if (doc.exists) {
                                userProgress = doc.data().progress || {};
                                localStorage.setItem('jlt_progress_cache', JSON.stringify(userProgress));
                                // Re-render whichever view is active to update progress bars
                                if (currentMainTopic) showSubtopics(currentMainTopic);
                                else renderMainTopics();
                            }
                        } catch (e) {
                            console.error("Error loading progress:", e);
                        }
                    }
                    resolve();
                };

                if (auth.currentUser) {
                    await checkUser(auth.currentUser);
                } else {
                    const unsub = auth.onAuthStateChanged(async (u) => {
                        unsub();
                        await checkUser(u);
                    });
                }
            });
        }

        async function saveProgress(topicId, score, total, blockIdx = -1, subtopicTotal = -1, numBlocks = -1, onComplete = null) {
            const user = auth.currentUser;
            if (!user) return;

            const key = blockIdx === -1 ? topicId : `${topicId}_block_${blockIdx}`;
            const existing = userProgress[key] || { highscore: 0, total: total };

            let updated = false;
            // Update block/topic score
            if (score >= existing.highscore) {
                userProgress[key] = { highscore: score, total: total };
                updated = true;
            }

            // Sync total questions if provided
            if (subtopicTotal > 0) {
                const totalKey = topicId + "_totalQuests";
                if (!userProgress[totalKey] || userProgress[totalKey] < subtopicTotal) {
                    userProgress[totalKey] = subtopicTotal;
                    updated = true;
                }
            }

            // Sync num blocks if provided
            if (numBlocks > 0) {
                const blocksKey = topicId + "_numBlocks";
                if (!userProgress[blocksKey] || userProgress[blocksKey] < numBlocks) {
                    userProgress[blocksKey] = numBlocks;
                    updated = true;
                }
            }

            if (updated) {
                // Recalculate global percentage
                calculateJltGlobalPercent();

                // Update Firestore
                try {
                    await db.collection('users').doc(user.uid).set({
                        progress: userProgress
                    }, { merge: true });

                    // Also sync with main examix_user storage for the dashboard
                    const localUser = JSON.parse(localStorage.getItem('examix_user'));
                    if (localUser) {
                        localUser.progress = userProgress;
                        localStorage.setItem('examix_user', JSON.stringify(localUser));
                    }
                } catch (e) {
                    console.error("Failed to save to Firestore:", e);
                }

                // Call the optional callback if provided
                if (typeof onComplete === 'function') {
                    onComplete();
                } else {
                    // Auto-refresh the current view if applicable
                    if (currentView === 'main-topics-view') {
                        renderMainTopics();
                    } else if (currentView === 'subtopics-view' && currentMainTopic) {
                        showSubtopics(currentMainTopic);
                    } else if (currentView === 'blocks-view' && currentQuizData.length > 0) {
                        const subName = document.getElementById('current-blocks-title').textContent;

        function calculateJltGlobalPercent() {
            let globalTotalPercent = 0;
            const mainTopics = Object.keys(JLT_CONFIG);

            mainTopics.forEach(name => {
                const topic = JLT_CONFIG[name];
                let totalSubtopicPercent = 0;
                const subtopicsCount = topic.subtopics.length;

                topic.subtopics.forEach(sub => {
                    const subId = normalizeStr(`jlt_${name}_${sub.name}`);
                    let subPercent = 0;
                    const numBlocks = userProgress[subId + "_numBlocks"] || 0;

                    if (numBlocks > 0) {
                        let totalBlockPercent = 0;
                        for (let i = 0; i < numBlocks; i++) {
                            const blockKey = `${subId}_block_${i}`;
                            const bp = userProgress[blockKey];
                            if (bp && bp.total > 0) totalBlockPercent += (bp.highscore / bp.total);
                        }
                        subPercent = (totalBlockPercent / numBlocks);
                    } else {
                        const subTotal = userProgress[subId + "_totalQuests"] || 0;
                        if (subTotal > 0) {
                            const blocks = Object.keys(userProgress).filter(k => k.startsWith(subId + "_block_"));
                            let highSum = 0;
                            blocks.forEach(bk => highSum += userProgress[bk].highscore);
                            subPercent = highSum / subTotal;
                        } else if (userProgress[subId] && userProgress[subId].total > 0) {
                            subPercent = userProgress[subId].highscore / userProgress[subId].total;
                        }
                    }
                    totalSubtopicPercent += subPercent;
                });
                globalTotalPercent += (totalSubtopicPercent / subtopicsCount);
            });

            const finalGlobalPercent = Math.round((globalTotalPercent / mainTopics.length) * 100);
            userProgress['jlt_global_percent'] = finalGlobalPercent;
            localStorage.setItem('jlt_progress_cache', JSON.stringify(userProgress));

        async function startMegaQuiz(topic) {

                    });
                    allData = allData.concat(data);
                }
                if (allData.length === 0) throw new Error("No data found in any sheet.");

                // Shuffle all combined questions and pick exactly 20
                shuffleArray(allData);
                activeBlockData = allData.slice(0, 20); // Fix: Set activeBlockData for beginQuiz

            } finally {

        async function fetchCSV(baseUrl, gid) {
            const url = `${baseUrl}&gid=${gid}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Fetch failed with status ${res.status}`);
            const text = await res.text();

            // Robust CSV parsing for newlines and quotes
            const parseCSV = (str) => {
                const rows = [];
                let row = [''];
                let inQuotes = false;
                for (let i = 0; i < str.length; i++) {
                    const char = str[i];
                    const next = str[i + 1];
                    if (char === '"' && inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
                    else if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) row.push('');
                    else if (char === '\n' && !inQuotes) { rows.push(row); row = ['']; }
                    else if (char !== '\r') row[row.length - 1] += char;
                }
                if (row.length > 1 || row[0] !== '') rows.push(row);
                return rows;
            };

            const rows = parseCSV(text);

            return rows.slice(1).map(r => ({
                question: (r[0] || '').trim(),
                options: [r[1], r[2], r[3], r[4]].map(o => (o || '').trim()).filter(o => o),
                correctText: (r[1] || '').trim(),
                explanation: (r[5] || '').trim()
            })).filter(q => q.question && q.correctText);
        }

        function renderLearning(data) {
            const container = document.getElementById('learning-content');

                    ${isRepeat ? `<button onclick="removeFromRepeat(${i})" style="position: absolute; top: 10px; left: 0; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #EF4444; padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: 700;">Remove</button>` : ''}
                `;
                container.appendChild(div);
            });
            startTimer(30 * 60, true);

        async function removeFromRepeat(idx) {
            const ok = await showPopup("Remove this question from Repeat Session?", "confirm");
            if (!ok) return;

            const repeatKey = `jlt_repeat_questions_${currentTopicId}`;
            let repeatQuestions = JSON.parse(localStorage.getItem(repeatKey) || '[]');

            // Remove by matching question text and current index
            const questionToRemove = activeBlockData[idx].question;
            const updated = repeatQuestions.filter(q => q.question !== questionToRemove);

            localStorage.setItem(repeatKey, JSON.stringify(updated));
            activeBlockData = updated;

            // Cloud Sync
            const user = auth.currentUser;
            if (user) {
                db.collection('users').doc(user.uid).get().then(doc => {
                    let repeatMap = {};
                    if (doc.exists) repeatMap = doc.data().repeatQuestions || {};
                    repeatMap[repeatKey] = updated;
                    db.collection('users').doc(user.uid).update({ repeatQuestions: repeatMap });
                });
            }

            if (activeBlockData.length === 0) {
                await showPopup("Repeat Session is now empty.");
                showView('blocks-view');
                renderBlocks(currentQuizData, document.getElementById('current-blocks-title').textContent);
            } else {
                renderLearning(activeBlockData);
            }
        }

        function beginQuiz() {
            currentIdx = 0;
            currentScore = 0;

            // Initialize user state for each question
            activeBlockData.forEach(q => {
                q.userGuess = null;
                q.shuffledOptions = [...q.options];
                shuffleArray(q.shuffledOptions);
                q.correctIdx = q.shuffledOptions.indexOf(q.correctText);
            });

            shuffleArray(activeBlockData);
            showView('quiz-view');
            startTimer(activeBlockData.length * 60); // 1 minute per question
            loadQuestion();
        }

        function startTimer(seconds, isLearning = false) {
            clearInterval(timerInterval);
            timeLeft = seconds;
            const elementId = isLearning ? 'learning-timer' : 'timer';
            updateTimerDisplay(elementId);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay(elementId);
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if (isLearning) {
                        showPopup("Learning time is up! Starting quiz mode.").then(() => {
                            beginQuiz();
                        });
                    } else {
                        showPopup("Time's up!").then(() => {
                            finishQuiz();
                        });
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay(elementId) {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            const el = document.getElementById(elementId || 'timer');
            if (el) {
                el.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }
        }

        function loadQuestion() {
            const q = activeBlockData[currentIdx];

            document.getElementById('question-number').textContent = `Question ${currentIdx + 1}/${activeBlockData.length}`;
            
            // Show subtopic name if available (Mega Quiz or standard)
            const subDisplay = document.getElementById('subtopic-display');
            if (q.subtopicName) {
                subDisplay.textContent = q.subtopicName;
            } else if (typeof currentSubtopicName !== 'undefined') {
                subDisplay.textContent = currentSubtopicName;
            } else {
                subDisplay.textContent = "";
            }

            document.getElementById('question').textContent = q.question;

            // Nav button visibility
            document.getElementById('prev-btn').style.visibility = currentIdx > 0 ? 'visible' : 'hidden';
            const nextBtn = document.getElementById('next-btn');
            nextBtn.textContent = (currentIdx === activeBlockData.length - 1) ? 'Finish Quiz' : 'Next Question →';

            // Only show Next if already answered
            nextBtn.style.visibility = (q.userGuess !== null) ? 'visible' : 'hidden';

            const explanationContainer = document.getElementById('explanation-container');
            if (q.userGuess !== null && q.explanation) {
                document.getElementById('explanation-text').textContent = q.explanation;
                explanationContainer.classList.remove('hidden');
            } else {
                explanationContainer.classList.add('hidden');
            }

            container.innerHTML = '';

            q.shuffledOptions.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn arabic-text';
                btn.textContent = opt;

                // Restore state if previously answered
                if (q.userGuess !== null) {
                    btn.disabled = true;
                    if (i === q.correctIdx) btn.classList.add('correct');
                    else if (i === q.userGuess) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => checkAnswer(btn, i);
                }

                container.appendChild(btn);
            });
        }

        function checkAnswer(btn, idx) {
            const q = activeBlockData[currentIdx];
            q.userGuess = idx;

            const buttons = document.querySelectorAll('.answer-btn');
            if (idx === q.correctIdx) {
                btn.classList.add('correct');
                currentScore++;
            } else {
                btn.classList.add('wrong');
                buttons[q.correctIdx].classList.add('correct');
            }

            buttons.forEach(b => b.disabled = true);

            if (q.explanation) {
                document.getElementById('explanation-text').textContent = q.explanation;
                document.getElementById('explanation-container').classList.remove('hidden');
            }

            document.getElementById('next-btn').style.visibility = 'visible';
        }

        function nextQuestion() {
            if (currentIdx < activeBlockData.length - 1) {
                currentIdx++;

        function prevQuestion() {

        function addToRepeat() {
            const q = activeBlockData[currentIdx];
            const targetTopicId = q.topicId || currentTopicId;
            const repeatKey = targetTopicId ? `jlt_repeat_questions_${targetTopicId}` : 'jlt_repeat_questions';
            let repeatQuestions = JSON.parse(localStorage.getItem(repeatKey) || '[]');

            // Check if already added
            if (!repeatQuestions.some(item => item.question === q.question)) {
                // Remove quiz-specific runtime state before saving
                const questToSave = {
                    question: q.question,
                    options: q.options,
                    correctText: q.correctText,
                    explanation: q.explanation
                };
                repeatQuestions.push(questToSave);
                localStorage.setItem(repeatKey, JSON.stringify(repeatQuestions));

                // Cloud Sync
                const user = auth.currentUser;
                if (user) {
                    db.collection('users').doc(user.uid).get().then(doc => {
                        let repeatMap = {};
                        if (doc.exists) repeatMap = doc.data().repeatQuestions || {};
                        repeatMap[repeatKey] = repeatQuestions;
                        db.collection('users').doc(user.uid).update({ repeatQuestions: repeatMap });
                    });

                const btn = document.getElementById('repeat-btn');
                btn.textContent = "✅ Added";

                showPopup("This question is already in your repeat session.");

        async function finishQuiz() {
            clearInterval(timerInterval);
            const total = activeBlockData.length;
            const scorePercent = Math.round((currentScore / total) * 100);

            document.getElementById('final-score').textContent = `${currentScore}/${total}`;
            document.getElementById('result-message').textContent = scorePercent >= 80 ? "Excellent work! You've mastered this section." : "Good effort! Keep practicing to improve your score.";

                    if (currentMainTopic) showSubtopics(currentMainTopic);
                    else showMainTopics();

            showView('results-view');

            // Save progress
            if (currentTopicId && currentBlockIdx !== -2) {
                const blockSize = 20;
                const numBlocks = Math.ceil(currentQuizData.length / blockSize);
                await saveProgress(currentTopicId, currentScore, total, currentBlockIdx, currentQuizData.length, numBlocks);
            }

            showView('main-topics-view');
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function showLoading(show) {
            const loader = document.getElementById('fetch-loader');
            if (loader) loader.style.display = show ? 'block' : 'none';
            document.body.style.overflow = show ? 'hidden' : '';
        }

        init();
    </script>
</body>

</html>
