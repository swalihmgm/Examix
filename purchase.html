<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Enrollment - Examix</title>
    <link rel="icon" href="20241021_114020.jpg">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .purchase-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            padding: 24px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 768px) {
            .purchase-card {
                margin: 100px auto;
                padding: 50px;
                border-radius: 32px;
            }
        }

        .course-preview {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .course-icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .course-name {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            margin-bottom: 10px;
            color: #fff;
        }

        .price-tag {
            font-size: 24px;
            font-weight: 800;
            color: var(--success);
            margin-bottom: 20px;
        }

        .confirm-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        }

        .confirm-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.5);
            filter: brightness(1.1);
        }

        .cancel-link {
            display: block;
            margin-top: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .cancel-link:hover {
            color: var(--error);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .step {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }

        .step.active {
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="purchase-card">
        <div class="step-indicator">
            <div class="step"></div>
            <div class="step"></div>
            <div class="step active"></div>
        </div>

        <h1 style="margin-bottom: 10px;">Complete Enrollment</h1>
        <p style="color: var(--text-muted); margin-bottom: 40px;">Review your selection and confirm your free
            enrollment.
        </p>

        <div class="course-preview" id="course-details">
            <div class="course-icon" id="c-icon">❓</div>
            <div class="course-name" id="c-name">Loading Course...</div>
            <p id="c-desc" style="color: var(--text-muted); margin-bottom: 20px;"></p>
            <div class="price-tag">FREE ENROLLMENT</div>
        </div>

        <button class="confirm-btn" onclick="confirmEnrollment()">Enroll Now & Start Learning</button>
        <a href="landing.html" class="cancel-link">Cancel and Return</a>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>

    <script>
        const COURSES = [
            { id: 'arabic-lit', name: 'Arabic Literature', icon: '📚', description: 'Master the depth of classical and modern Arabic literary works.' },
            { id: 'islamic-studies', name: 'Islamic Studies', icon: '📖', description: 'Deep dive into Fiqh, Thareeh, and theology foundations.' },
            { id: 'research', name: 'Research Methodology', icon: '🔬', description: 'Learn the tools and techniques for academic research excellence.' },
            { id: 'general', name: 'General Arabic', icon: '🌍', description: 'Foundational Arabic for all levels of expertise.' }
        ];

        let selectedCourse = null;

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('course');

            selectedCourse = COURSES.find(c => c.id === courseId);

            if (!selectedCourse) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('c-icon').textContent = selectedCourse.icon;
            document.getElementById('c-name').textContent = selectedCourse.name;
            document.getElementById('c-desc').textContent = selectedCourse.description;

            // Auth Check
            const user = localStorage.getItem('examix_user');
            if (!user) {
                window.location.href = 'auth.html?redirect=' + courseId;
            }
        });

        async function confirmEnrollment() {
            const userStr = localStorage.getItem('examix_user');
            if (!userStr) return;

            const currentUser = JSON.parse(userStr);
            const enrolled = currentUser.enrolledCourses || [];

            if (!enrolled.includes(selectedCourse.id)) {
                enrolled.push(selectedCourse.id);
                currentUser.enrolledCourses = enrolled;

                // Update Local
                localStorage.setItem('examix_user', JSON.stringify(currentUser));

                // Update Firestore
                try {
                    const authUser = firebase.auth().currentUser;
                    if (authUser) {
                        await db.collection('users').doc(authUser.uid).update({
                            enrolledCourses: enrolled
                        });
                    }
                } catch (error) {
                    console.error("Firestore update failed", error);
                }
            }

            window.location.href = 'index.html?enroll=' + selectedCourse.id;
        }
    </script>
</body>

</html>
