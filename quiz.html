<!DOCTYPE html><!--  -->
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="auth.js"></script>
  <script src="popups.js"></script>
</head>

<body>
  <!-- Background Decoration -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- Preloader -->
  <div id="preloader">
    <div id="loader-content">
      <img src="20241020_171328.png" alt="Loading Icon" id="loader-icon">
      <p>Loading questions...</p>
    </div>
  </div>

  <!-- Main content (hidden initially) -->
  <div id="main-content" style="display: none;">
    <!-- Your quiz content goes here -->
  </div>
  <!-- Navbar -->
  <div class="navbar">
    <img src="20241020_171328.png" alt="Logo"> <!-- Left logo -->
    <h2>examix</h2>
    <img id="nav-icon" src="20241020_171143.png" alt="Menu Icon"> <!-- Right nav icon -->
  </div>
  <div id="quiz-header">
    <p id="question-number"></p>
    <p id="timer"></p>
  </div>
  <div class="quiz">
    <div id="quiz-container">
      <h1>زحافات والعلة</h1>
      <div id="question-container">
        <p id="question"></p>
        <div id="explanation-container" class="hidden"
          style="background: rgba(139, 92, 246, 0.1); border-right: 4px solid var(--primary); padding: 15px; margin: 15px 0; border-radius: 8px; font-size: 15px; color: var(--text-muted); text-align: right; direction: rtl;">
          <div
            style="font-weight: 800; color: var(--primary); margin-bottom: 5px; font-size: 12px; text-transform: uppercase;">
            Explanation</div>
          <div id="explanation-text"></div>
        </div>
        <div id="answers">
          <button class="answer-btn" onclick="checkAnswer(this, 0)">Option 1</button>
          <button class="answer-btn" onclick="checkAnswer(this, 1)">Option 2</button>
          <button class="answer-btn" onclick="checkAnswer(this, 2)">Option 3</button>
          <button class="answer-btn" onclick="checkAnswer(this, 3)">Option 4</button>
        </div>
      </div>
      <div id="navigation-buttons" style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
        <button id="prev-btn" onclick="prevQuestion()" style="display: none;">Previous Question</button>
        <button id="repeat-btn" onclick="addToRepeat()"
          style="background: rgba(139, 92, 246, 0.1); border: 1px solid var(--primary); color: var(--primary); padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer;">🔁
          Add to Repeat</button>
        <button id="next-btn" onclick="nextQuestion()">Next Question</button>
      </div>
    </div>
  </div>
  <div id="result-container" style="display: none;">
    <h2>Quiz Completed!</h2>
    <p id="score"></p>
    <button onclick="location.reload()">Restart</button>
  </div>

  <div id="review-container"
    style="display: none; padding: 20px; background: var(--card-bg); border-radius: 20px; border: 1px solid var(--glass-border); max-width: 600px; margin: 20px auto;">
    <h2 style="text-align: center; margin-bottom: 20px;">Review Saved Questions</h2>
    <div id="review-content" style="max-height: 400px; overflow-y: auto; margin-bottom: 20px; padding-right: 10px;">
    </div>
    <div style="display: flex; gap: 10px; justify-content: center;">
      <button onclick="location.reload()"
        style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer;">Back
        to Quiz</button>
      <button onclick="window.location.href='index.html'"
        style="background: rgba(255,b255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-main); padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer;">Home</button>
    </div>
  </div>

  <script src="quiz.js"></script>
</body>

</html>
